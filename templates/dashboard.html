<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedSwift - Dashboard</title>

<!-- KEEP YOUR ORIGINAL STYLE -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
/* FIX MAP ISSUE */
#map {
  height: 100vh;
  width: 100%;
}
</style>

</head>
<body class="dashboard-body">

<!-- ORIGINAL NAV -->
<nav class="dash-nav">
  <a href="/" class="logo-mark">
    <div class="logo-cross">+</div>
    <span class="logo-text">MedSwift</span>
  </a>
  <div class="nav-right">
    <span id="user-display" class="user-name-display"></span>
    <button class="btn-outline btn-sm" onclick="handleLogout()">Sign Out</button>
  </div>
</nav>

<div class="dash-layout">

<!-- ORIGINAL SIDEBAR -->
<aside class="dash-sidebar">

  <!-- LOCATION -->
  <div class="sidebar-section">
    <div class="section-label">Your Location</div>
    <div id="location-status" class="location-box">
      <span id="loc-text">Detecting location...</span>
      <button class="btn-sm btn-outline" onclick="detectLocation()">Refresh</button>
    </div>
    <div id="coords-display" class="coords-small" style="display:none;"></div>
  </div>

  <!-- BOOK BUTTON -->
  <button id="book-btn" class="btn-emergency btn-full" onclick="initiateBooking()">
    🚑 Book Emergency Transport
  </button>

  <!-- ✅ NEW BOOKING PANEL (ADDED ONLY) -->
  <div id="booking-panel" style="display:none;">
    <div class="sidebar-section">
      <div class="section-label">Booking Confirmed</div>

      <div id="b-id"></div>
      <div id="b-driver"></div>
      <div id="b-vehicle"></div>

      <!-- ✅ CANCEL BUTTON -->
      <button onclick="cancelBooking()" class="btn-outline btn-full">
        Cancel Booking ❌
      </button>
    </div>
  </div>

  <!-- ORIGINAL HOSPITAL PANEL -->
  <div id="hospitals-panel" style="display:none;">
    <div class="sidebar-section">
      <div class="section-label">Nearest Hospitals</div>
      <div id="hospitals-list"></div>
    </div>
  </div>

</aside>

<!-- ORIGINAL MAP -->
<main class="dash-map-container">
  <div id="map">
    <div style="text-align:center;padding:20px;">Loading map...</div>
  </div>
</main>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {{ firebase_config | tojson | safe }};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- IMPORTANT ORDER -->
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<!-- ✅ FIX MAP NOT LOADING -->
<script>
document.addEventListener("DOMContentLoaded", () => {
  console.log("Dashboard Loaded");

  // Force map init if not triggered
  if (typeof initMap === "function") {
    initMap(28.6139, 77.2090);
  }
});
</script>

</body>
</html>
