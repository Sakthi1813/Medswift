<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedSwift - Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
#map {
  height: 100vh;
  width: 100%;
}
</style>
</head>

<body class="dashboard-body">

<!-- NAVBAR -->
<nav class="dash-nav">
  <a href="/" class="logo-mark">
    <div class="logo-cross">+</div>
    <span class="logo-text">MedSwift</span>
  </a>

  <div class="nav-right">
    <span id="user-display"></span>
    <button onclick="handleLogout()" class="btn-outline">Sign Out</button>
  </div>
</nav>

<div class="dash-layout">

<!-- SIDEBAR -->
<aside class="dash-sidebar">

  <!-- LOCATION -->
  <div class="sidebar-section">
    <div class="section-label">Your Location</div>
    <div id="location-status">
      <span id="loc-text">Detecting...</span>
      <button onclick="detectLocation()" class="btn-outline btn-sm">Refresh</button>
    </div>
  </div>

  <!-- BOOK BUTTON -->
  <button onclick="initiateBooking()" class="btn-emergency btn-full">
    🚑 Book Emergency Transport
  </button>

  <!-- BOOKING PANEL -->
  <div id="booking-panel" style="display:none;">
    <div class="sidebar-section">
      <div class="section-label">Booking Confirmed</div>

      <p id="b-id"></p>
      <p id="b-driver"></p>
      <p id="b-vehicle"></p>

      <!-- ✅ CANCEL BUTTON -->
      <button onclick="cancelBooking()" class="btn-outline btn-full">
        Cancel Booking ❌
      </button>
    </div>
  </div>

  <!-- HOSPITALS -->
  <div id="hospitals-panel" style="display:none;">
    <div class="sidebar-section">
      <div class="section-label">Nearest Hospitals</div>
      <div id="hospitals-list"></div>
    </div>
  </div>

</aside>

<!-- MAP -->
<main>
  <div id="map">
    <div style="padding:20px;text-align:center;">Loading map...</div>
  </div>
</main>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Firebase Config -->
<script>
const firebaseConfig = {{ firebase_config | tojson | safe }};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
</script>

<!-- JS FILES -->
<script src="{{ url_for('static', filename='js/map.js') }}"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

</body>
</html>
